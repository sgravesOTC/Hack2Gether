{% extends 'base.html' %}

{% block title %}Password Reset Complete | OTCPulse{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card auth-card-centered">
        <div class="auth-success-icon">🎉</div>
        <h1>All Done!</h1>
        <p class="auth-subtitle">Your password has been reset. You can now log in with your new password.</p>
        <div class="field-submit">
            <a href="{% url 'account:login' %}" class="btn btn-primary">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
