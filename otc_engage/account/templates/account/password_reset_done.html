{% extends 'base.html' %}

{% block title %}Reset Link Sent | OTCPulse{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card auth-card-centered">
        <div class="auth-success-icon">📬</div>
        <h1>Check Your Email</h1>
        <p class="auth-subtitle">If an account with that email exists, a reset link is on its way.</p>
        <p class="auth-footer">
            <a href="{% url 'account:login' %}">Back to Log In</a>
        </p>
    </div>
</div>
{% endblock %}
