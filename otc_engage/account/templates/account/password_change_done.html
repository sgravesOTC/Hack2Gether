{% extends 'base.html' %}

{% block title %}Password Changed | OTCPulse{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card auth-card-centered">
        <div class="auth-success-icon">✅</div>
        <h1>Password Updated</h1>
        <p class="auth-subtitle">Your password has been changed successfully.</p>
        <div class="field-submit">
            <a href="{% url 'account:profile' %}" class="btn btn-primary">Back to Profile</a>
        </div>
    </div>
</div>
{% endblock %}
